version: "3.8"

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_canvas_flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存（Python 与 NestJS 共用，NestJS BullMQ 也使用 Redis）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ 消息队列（仅 Python Celery 需要，NestJS 用 Redis BullMQ，可按需启用）
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NestJS 后端 API 服务（主力，需显式 --profile nest 启用）
  # 启动命令：docker compose --profile nest up -d
  # 端口映射 8001:8000，避免与下方 Python api 服务的 8000 端口冲突
  backend-nest:
    profiles: ["nest"]
    build:
      context: ./backend_nest
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_canvas_flow
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ai-canvas-flow
      MINIO_SECURE: "false"
      SECRET_KEY: dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ALGORITHM: HS256
      CORS_ORIGINS: '["http://localhost:5173"]'
      DEFAULT_AI_PROVIDER_NAME: 火山引擎
      DEFAULT_AI_PLATFORM: volcengine
      DEFAULT_AI_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
      DEFAULT_AI_API_KEY: ""
      DEFAULT_AI_MODEL_ID: doubao-seed-2-1-turbo-260628
      DEFAULT_AI_MODEL_DISPLAY_NAME: 豆包 Seed 2.1 Turbo
      DEFAULT_AI_MODEL_TYPE: llm
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # 不依赖 rabbitmq：NestJS 用 BullMQ + Redis 替代 Celery + RabbitMQ
    restart: unless-stopped

  # Python 后端 API 服务（兼容备份，NestJS 为主力时可注释掉）
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_canvas_flow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Python Celery Worker（仅 Python 后端需要）
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_canvas_flow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker -l info

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
